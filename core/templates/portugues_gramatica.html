<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detetive de Palavras</title>
    <style>
        body { background-color: #2c3e50; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; margin: 0; }
        h1 { font-size: 2.5em; color: #f1c40f; margin-bottom: 5px; margin-top: 40px; }
        
        .area-jogo { max-width: 900px; margin: 20px auto; background: rgba(0,0,0,0.2); padding: 40px 20px; border-radius: 20px; }
        
        .icone-destaque { font-size: 4em; margin-bottom: 20px; }
        .pergunta-container { font-size: 1.8em; line-height: 1.5; margin-bottom: 40px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px;}
        
        .grid-opcoes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        
        .btn-opcao { background-color: #3498db; color: white; padding: 20px; border-radius: 12px; font-size: 1.5em; font-weight: bold; cursor: pointer; border: 4px solid #2980b9; transition: all 0.2s; }
        .btn-opcao:hover { transform: scale(1.05); background-color: #2980b9; }
        .btn-opcao.correto { background-color: #2ecc71; border-color: #27ae60; }
        .btn-opcao.errado { background-color: #e74c3c; border-color: #c0392b; animation: tremer 0.3s; }
        
        @keyframes tremer {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        
        .placar { font-size: 1.5em; margin-top: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; display: inline-block; font-weight: bold; }
        .texto-progresso { color: #3498db; margin-right: 20px; }
        .texto-erros { color: #e74c3c; }
        
        .tela-fim { display: none; }
        .tela-fim h2 { font-size: 3em; color: #2ecc71; }
        .btn-novo-jogo { background: #e74c3c; color: white; padding: 15px 30px; font-size: 1.5em; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        
        .btn-voltar { position: absolute; top: 15px; left: 15px; text-decoration: none; color: white; font-weight: bold; background: #34495e; padding: 10px 15px; border-radius: 8px; z-index: 100; font-size: 1em; }

        /* AJUSTES PARA CELULAR (RESPONSIVIDADE TURBINADA) */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.6em; margin-top: 55px; margin-bottom: 10px; }
            .area-jogo { padding: 20px 10px; margin: 10px auto; border-radius: 15px; }
            .pergunta-container { 
                font-size: 1.1em; /* Diminui bem a fonte para caber a frase */
                line-height: 1.4; 
                margin-bottom: 20px; 
                padding: 15px; 
                text-align: center; 
            }
            .grid-opcoes { grid-template-columns: 1fr; gap: 10px; }
            .btn-opcao { font-size: 1.1em; padding: 15px; border-width: 3px; }
            .placar { 
                font-size: 1.1em; 
                padding: 10px; 
                display: flex; 
                justify-content: space-around; 
                width: 100%; 
                box-sizing: border-box; 
                margin-top: 10px;
            }
            .texto-progresso { margin-right: 0; }
            .tela-fim h2 { font-size: 2em; }
            .btn-novo-jogo { font-size: 1.2em; padding: 12px 20px; }
            .btn-voltar { font-size: 0.9em; top: 10px; left: 10px; padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <a href="{% url 'menu_portugues' %}" class="btn-voltar">⬅ Voltar</a>

    <h1>Detetive de Palavras 🔎</h1>
    <p>Leia a frase e encontre a classe gramatical correta!</p>

    <div class="area-jogo" id="tela-quiz">
        <div class="pergunta-container" id="pergunta-display"></div>
        <div class="grid-opcoes" id="opcoes-display"></div>
    </div>

    <div class="area-jogo tela-fim" id="tela-fim">
        <h2>🎉 Investigação Concluída! 🎉</h2>
        <button class="btn-novo-jogo" onclick="location.reload()">Jogar Novamente</button>
    </div>

    <div class="placar">
        <span class="texto-progresso">Desafio: <span id="contador-atual">1</span>/<span id="total-questoes"></span></span>
        <span class="texto-erros">Erros: <span id="contador-erros">0</span></span>
    </div>

    <script>
        const questoesData = {{ questoes_json|safe }};
        let indiceAtual = 0;
        let erros = 0;
        let erroNestaQuestao = 0;
        const totalQuestoes = questoesData.length;
        const tempoInicio = Date.now();
        let tempoInicioQuestao = Date.now();

        const perguntaDisplay = document.getElementById('pergunta-display');
        const opcoesDisplay = document.getElementById('opcoes-display');
        document.getElementById('total-questoes').innerText = totalQuestoes;

        function carregarQuestao() {
            if (indiceAtual >= totalQuestoes) {
                finalizarJogo();
                return;
            }

            const dadosAtuais = questoesData[indiceAtual];
            perguntaDisplay.innerHTML = `<strong>${dadosAtuais.pergunta}</strong>`;
            opcoesDisplay.innerHTML = '';
            document.getElementById('contador-atual').innerText = indiceAtual + 1;

            dadosAtuais.opcoes.forEach(opcao => {
                const btn = document.createElement('button');
                btn.className = 'btn-opcao';
                btn.innerText = opcao;
                btn.onclick = () => verificarResposta(btn, opcao, dadosAtuais.resposta);
                opcoesDisplay.appendChild(btn);
            });
        }

        function verificarResposta(botao, selecionada, correta) {
            if (selecionada === correta) {
                botao.classList.add('correto');
                const todosBotoes = document.querySelectorAll('.btn-opcao');
                todosBotoes.forEach(b => b.disabled = true);

                salvarQuestaoIndividual(erroNestaQuestao === 0);
                erroNestaQuestao = 0;

                setTimeout(() => {
                    indiceAtual++;
                    carregarQuestao();
                }, 1200);
            } else {
                botao.classList.add('errado');
                setTimeout(() => botao.classList.remove('errado'), 400);
                erros++;
                erroNestaQuestao++;
                document.getElementById('contador-erros').innerText = erros;
            }
        }

        function salvarQuestaoIndividual(acertouDePrimeira) {
            const tempoFimQuestao = Date.now();
            const tempoQuestao = Math.floor((tempoFimQuestao - tempoInicioQuestao) / 1000);
            tempoInicioQuestao = Date.now();

            fetch('/salvar_jogada/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    operacao: 'portugues_gramatica',
                    nivel: 'nivel2_questao',
                    resposta_aluno: 'questao_' + indiceAtual,
                    acertou: acertouDePrimeira,
                    tempo_segundos: tempoQuestao
                })
            });
        }

        function finalizarJogo() {
            document.getElementById('tela-quiz').style.display = 'none';
            document.getElementById('tela-fim').style.display = 'block';
            document.getElementById('contador-atual').innerText = totalQuestoes;

            const tempoFim = Date.now();
            const tempoSegundos = Math.floor((tempoFim - tempoInicio) / 1000);
            const rodadaPerfeita = (erros === 0);
            
            fetch('/salvar_jogada/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    operacao: 'portugues_gramatica',
                    nivel: 'nivel2',
                    resposta_aluno: erros.toString(),
                    acertou: rodadaPerfeita,
                    tempo_segundos: tempoSegundos
                })
            });
        }

        carregarQuestao();
    </script>
</body>
</html>
