<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Separando o Extrativismo</title>
    <style>
        body { background-color: #8e44ad; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        h1 { margin-top: 50px; font-size: 2em; color: #f1c40f; }
        .instrucao { font-size: 1.2em; margin-bottom: 20px; }
        
        .area-itens { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .item { background: white; color: #333; padding: 15px 20px; border-radius: 10px; font-weight: bold; font-size: 1.2em; cursor: pointer; border: 4px solid transparent; transition: 0.2s; }
        .item.selecionado { border-color: #f1c40f; transform: scale(1.1); box-shadow: 0 0 15px #f1c40f; background-color: #fff9e6; }
        .item.guardado { display: none; }
        
        .area-caixas { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .caixa { width: 30%; min-width: 150px; background: rgba(0,0,0,0.3); border: 3px dashed rgba(255,255,255,0.5); border-radius: 15px; padding: 20px 10px; font-size: 1.5em; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; min-height: 100px; }
        .caixa:hover { background: rgba(255,255,255,0.1); border-color: white; }
        
        .icone-caixa { font-size: 2em; margin-bottom: 10px; }
        .itens-dentro { font-size: 0.6em; color: #f1c40f; margin-top: 10px; font-weight: normal; }

        .btn-voltar { position: absolute; top: 10px; left: 10px; background: #c0392b; color: white; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 0.9em; }

        .tela-fim { display: none; margin-top: 40px; }
        .btn-novo { background: #2ecc71; color: white; padding: 15px 30px; font-size: 1.2em; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            h1 { font-size: 1.6em; margin-top: 60px; }
            .item { font-size: 1em; padding: 10px 15px; }
            .caixa { width: 100%; min-height: 80px; flex-direction: row; justify-content: flex-start; padding: 10px; gap: 15px; text-align: left; }
            .icone-caixa { margin-bottom: 0; font-size: 2.5em; }
            .itens-dentro { margin-top: 0; font-size: 0.8em; margin-left: auto; }
        }
    </style>
</head>
<body>
    <a href="{% url 'menu_geografia' %}" class="btn-voltar">⬅ Voltar</a>

    <h1>Classificando os Recursos ⛏️</h1>
    <p class="instrucao">1º Toque na palavra. 2º Toque na caixa correta para guardar.</p>

    <div class="area-itens" id="container-itens">
        <div class="item" data-tipo="mineral" onclick="selecionarItem(this)">Ferro</div>
        <div class="item" data-tipo="vegetal" onclick="selecionarItem(this)">Madeira</div>
        <div class="item" data-tipo="animal" onclick="selecionarItem(this)">Caça</div>
        <div class="item" data-tipo="mineral" onclick="selecionarItem(this)">Petróleo</div>
        <div class="item" data-tipo="vegetal" onclick="selecionarItem(this)">Látex</div>
        <div class="item" data-tipo="animal" onclick="selecionarItem(this)">Pesca</div>
        <div class="item" data-tipo="mineral" onclick="selecionarItem(this)">Alumínio</div>
        <div class="item" data-tipo="vegetal" onclick="selecionarItem(this)">Castanha</div>
    </div>

    <div class="area-caixas" id="container-caixas">
        <div class="caixa" onclick="guardarNaCaixa('mineral')">
            <span class="icone-caixa">💎</span>
            Mineral
            <div class="itens-dentro" id="guardados-mineral">0 guardados</div>
        </div>
        <div class="caixa" onclick="guardarNaCaixa('vegetal')">
            <span class="icone-caixa">🌳</span>
            Vegetal
            <div class="itens-dentro" id="guardados-vegetal">0 guardados</div>
        </div>
        <div class="caixa" onclick="guardarNaCaixa('animal')">
            <span class="icone-caixa">🐟</span>
            Animal
            <div class="itens-dentro" id="guardados-animal">0 guardados</div>
        </div>
    </div>

    <div class="tela-fim" id="tela-fim">
        <h2>🎉 Você organizou tudo! 🎉</h2>
        <button class="btn-novo" onclick="location.reload()">Jogar Novamente</button>
    </div>

    <script>
        let itemSelecionado = null;
        let totalGuardados = 0;
        const contadores = { mineral: 0, vegetal: 0, animal: 0 };

        function selecionarItem(elemento) {
            document.querySelectorAll('.item').forEach(i => i.classList.remove('selecionado'));
            elemento.classList.add('selecionado');
            itemSelecionado = elemento;
        }

        function guardarNaCaixa(tipoCaixa) {
            if (!itemSelecionado) return;

            if (itemSelecionado.dataset.tipo === tipoCaixa) {
                itemSelecionado.classList.add('guardado');
                itemSelecionado.classList.remove('selecionado');
                contadores[tipoCaixa]++;
                document.getElementById('guardados-' + tipoCaixa).innerText = contadores[tipoCaixa] + " guardados";
                
                itemSelecionado = null;
                totalGuardados++;

                if (totalGuardados === 8) {
                    document.getElementById('container-itens').style.display = 'none';
                    document.getElementById('container-caixas').style.display = 'none';
                    document.getElementById('tela-fim').style.display = 'block';
                }
            } else {
                alert("Opa! " + itemSelecionado.innerText + " não é do tipo " + tipoCaixa + ".");
            }
        }
    </script>
</body>
</html>
